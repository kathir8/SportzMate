<app-header 
  headerClass="from-mate-detail" 
  [showBackButton]="false"
  [enableSearch]="true"
  (searchChanged)="onSearchQueryChange($event)"
>
  <ion-title class="header-title" slot="start">Chats</ion-title>
</app-header>

<ion-content class="ion-padding chat-page">
  @if(personalChats().length === 0 && groupChats().length === 0) {
    <!-- No chats at all -->
    <div class="no-chat-found">
      No chats found
    </div>
  } @else if(shouldShowAccordion()) {
    <!-- Show accordion when both chat types exist -->
    <ionic-accordion [items]="accordionItems()"></ionic-accordion>
  } @else if(hasOnlyOneType()) {
    <!-- Show direct list when only one type exists -->
    @if(hasPersonalChatsEver()) {
      <app-chat-list-items 
        [chats]="filteredPersonalChats()"
        [currentUserId]="currentUser()?.userID || ''"
        [onChatClick]="onChatClickHandler"
      ></app-chat-list-items>
    } @else {
      <app-chat-list-items 
        [chats]="filteredGroupChats()"
        [currentUserId]="currentUser()?.userID || ''"
        [onChatClick]="onChatClickHandler"
      ></app-chat-list-items>
    }
  }
</ion-content>
